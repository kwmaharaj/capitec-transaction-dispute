services:
  postgres:
    image: postgres:18.1-bookworm
    environment:
      POSTGRES_DB: txdispute
      # Admin user only.
      POSTGRES_USER: txdispute_admin
      POSTGRES_PASSWORD: txdispute_admin
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U txdispute_admin -d txdispute"]
      interval: 5s
      timeout: 3s
      retries: 20
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      CAPITEC_PANHASH_SECRET: ${CAPITEC_PANHASH_SECRET}
      CAPITEC_JWT_SECRET: ${CAPITEC_JWT_SECRET}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 20


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://localhost:8080
    depends_on:
      - backend
    ports:
      - "3000:80"